syntax = "proto3";

import "google/protobuf/struct.proto";

package device_agent;

// Wire format a channel-event subscriber wants its payload delivered in.
// The protobuf `Struct` build (json_format.ParseDict) is ~90% of per-event
// encode cost; clients that read `data_json` can opt out of it with JSON_ONLY.
enum WireFormat {
  WIRE_FORMAT_BOTH = 0;         // default: populate both `data` (Struct) and `data_json` (backward compatible)
  WIRE_FORMAT_JSON_ONLY = 1;    // populate only `data_json`; skip the Struct build
  WIRE_FORMAT_STRUCT_ONLY = 2;  // populate only `data` (Struct)
}

// The doover device agent service definition.
service deviceAgent {
  rpc TestComms (TestCommsRequest) returns (TestCommsResponse) {}

  //  rpc GetChannelDetails (ChannelDetailsRequest) returns (ChannelDetailsResponse) {}

  rpc GetChannelSubscription (ChannelSubscriptionRequest) returns (stream ChannelSubscriptionResponse) {}
  rpc ChannelEventSubscription (ChannelEventSubscriptionRequest) returns (stream ChannelEventSubscriptionResponse) {}
  rpc WriteToChannel (ChannelWriteRequest) returns (ChannelWriteResponse) {}
  rpc GetDebugInfo (DebugInfoRequest) returns (DebugInfoResponse) {}
  //  rpc GetTempAPIToken (TempAPITokenRequest) returns (TempAPITokenResponse) {}
  rpc GetAggregate (GetAggregateRequest) returns (GetAggregateResponse) {}
  rpc GetTurnCredential (TurnCredentialRequest) returns (TurnCredentialResponse) {}
  rpc CreateMessage (CreateMessageRequest) returns (CreateMessageResponse) {}
  rpc UpdateMessage (UpdateMessageRequest) returns (UpdateMessageResponse) {}
  rpc UpdateAggregate (UpdateAggregateRequest) returns (UpdateAggregateResponse) {}
  rpc GetMessage (GetMessageRequest) returns (GetMessageResponse) {}
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse) {}
  rpc ListChannels (ListChannelsRequest) returns (ListChannelsResponse) {}
  rpc FetchAttachment (FetchAttachmentRequest) returns (FetchAttachmentResponse) {}

  rpc SendOneShotMessage (SendOneShotMessageRequest) returns (SendOneShotMessageResponse) {}
}

message RequestHeader {
  optional string app_id = 1;
}

message ResponseHeader {
  bool success = 1;
  bool cloud_synced = 2;
  bool cloud_ready = 5;
  optional int32 response_code = 3;
  optional string response_message = 4;
}

message MessageDetails {
  string message_id = 1;
  string channel_name = 2;
  string payload = 3;
  string timestamp = 4;
}

message ChannelDetails {
  string channel_name = 1;
  optional string aggregate = 2;
}

message AgentDetails {
  string agent_id = 1;
  string agent_name = 2;
  repeated ChannelDetails channels = 3;
}

message TestCommsRequest {
  RequestHeader header = 2;
  string message = 1;
}

message TestCommsResponse {
  ResponseHeader response_header = 1;
  string response = 2;
}

message MessageDetailsRequest {
  RequestHeader header = 2;
  string message_id = 1;
}

message MessageDetailsResponse {
  ResponseHeader response_header = 1;
  optional MessageDetails message = 2;
}

message ChannelDetailsRequest {
  RequestHeader header = 2;
  string channel_name = 1;
}

message ChannelDetailsResponse {
  ResponseHeader response_header = 1;
  optional ChannelDetails channel = 2;
}

message ChannelSubscriptionRequest {
  RequestHeader header = 2;
  string channel_name = 1;
}

message ChannelSubscriptionResponse {
  ResponseHeader response_header = 1;
  optional ChannelDetails channel = 2;
  optional MessageDetails message = 3;
}

message ChannelWriteRequest {
  RequestHeader header = 5;
  string channel_name = 1;
  string message_payload = 2;
  optional bool save_log = 3;
  optional int32 max_age = 4;
  optional float max_age_f = 6;
}

message DebugInfoRequest {
  RequestHeader header = 1;
}

message ChannelWriteResponse {
  ResponseHeader response_header = 1;
  string message_id = 2;
}

message DebugChannelState {
  string channel_name = 1;
  bool active = 2;
  float local_updated_at = 3;
  float cloud_updated_at = 4;
}

message DebugPendingMessage {
  string channel_name = 1;
  string app_key = 2;
  bool save_log = 3;
  string payload = 4;
  int32 publish_in = 5;
}

message DebugInfoResponse {
  ResponseHeader response_header = 1;
  repeated string active_callbacks = 2;
  repeated string wss_callbacks = 3;
  repeated string wss_aggregates = 4;
  repeated string wss_subscriptions = 5;
  repeated DebugChannelState channels = 6;
  repeated DebugPendingMessage pending_messages = 7;
  bool wss_connected = 8;
}

message TempAPITokenRequest {
  RequestHeader header = 1;
}

message TempAPITokenResponse {
  ResponseHeader response_header = 1;
  string token = 2;
  string valid_until = 3;
  string endpoint = 4;
}

message TurnCredentialRequest {
  RequestHeader header = 1;
  string camera_name = 2;
}

message TurnCredential {
  string username = 1;
  string credential = 2;
  uint64 ttl = 3;
  uint64 expires_at = 4;
  repeated string uris = 5;
}

message TurnCredentialResponse {
  ResponseHeader response_header = 1;
  TurnCredential turn_credential = 2;
}

message File {
  string  filename = 1;
  string  content_type = 2;
  bytes   data = 3;
  int64   size_bytes = 4;
}

message Attachment {
  string  filename = 1;
  string  content_type = 2;
  int64   size_bytes = 3;
  string  url = 4;
}

message ChannelID {
  uint64 agent_id = 1;
  string name = 2;
}

// Payloads ride in two fields during the Struct -> JSON migration.
// `data` (google.protobuf.Struct) stores every number as a double, so
// integers lose their type (42 -> 42.0) and values above 2^53 silently
// lose precision — fatal for snowflake IDs embedded in payloads.
// `data_json` carries the same payload as a JSON string, which round-trips
// integers exactly and is faster to encode/decode. Readers prefer
// `data_json` when set; writers populate both until the fleet is upgraded,
// after which `data` can be dropped.

message Message {
  uint64 message_id = 1;
  uint64 author_id = 2;
  ChannelID channel = 3;
  google.protobuf.Struct data = 4;
  repeated Attachment attachments = 5;
  string data_json = 6;
}

message GetMessageRequest {
  RequestHeader header = 1;
  string channel_name = 2;
  uint64 message_id = 3;
}

message GetMessageResponse {
  ResponseHeader response_header = 1;
  Message message = 2;
}

message GetMessagesRequest {
  RequestHeader header = 1;
  string channel_name = 2;
  optional uint64 before = 3;
  optional uint64 after = 4;
  optional uint32 limit = 5;
  repeated string field_names = 6;
}

message GetMessagesResponse {
  ResponseHeader response_header = 1;
  repeated Message messages = 2;
}

message CreateMessageRequest {
  RequestHeader header = 1;

  string channel_name = 2;
  google.protobuf.Struct data = 3;
  repeated File files = 4;
  uint64 timestamp = 5;
  string data_json = 6;
}

message CreateMessageResponse {
  ResponseHeader response_header = 1;
  uint64 message_id = 2;
}

message UpdateMessageRequest {
  RequestHeader header = 1;

  string channel_name = 2;
  string message_id = 3;
  google.protobuf.Struct data = 4;
  repeated File files = 5;
  optional bool clear_attachments = 6;
  optional bool replace_data = 7;
  string data_json = 8;
}

message UpdateMessageResponse {
  ResponseHeader response_header = 1;
  Message message = 2;
}

message Aggregate {
  google.protobuf.Struct data = 1;
  repeated Attachment attachments = 2;
  optional uint64 last_updated = 3;
  string data_json = 4;
}

message UpdateAggregateRequest {
  RequestHeader header = 1;

  string channel_name = 2;
  google.protobuf.Struct data = 4;
  repeated File files = 5;
  optional bool clear_attachments = 6;
  optional bool replace_data = 7;

  float max_age_secs = 8;
  bool save_log = 9;
  string data_json = 10;
  // When unset, the response echoes the full updated aggregate (legacy
  // behaviour). Set false to skip that full-aggregate to_proto encode on the
  // response — most callers discard it.
  optional bool return_aggregate = 11;

  // Merge-patch keys whose subtree is REPLACED wholesale rather than deep-merged
  // (pydoover's `replace_keys` -> the `?replace=` param on the cloud HTTP write).
  // Dotted paths, e.g. "state.children.<app_key>". Lets an app atomically swap a
  // subtree in one write instead of a clear(null)+set pair, which can be
  // reordered on the wire and leave the cloud aggregate cleared.
  repeated string replace_keys = 12;
}

message UpdateAggregateResponse {
  ResponseHeader response_header = 1;
  Aggregate aggregate = 2;
}

message ChannelEventSubscriptionRequest {
  RequestHeader header = 2;
  string channel_name = 1;
  WireFormat wire_format = 3;  // default WIRE_FORMAT_BOTH keeps legacy behaviour
  // Absent defaults to true in the server for backwards compatibility.
  optional bool replay_missed_messages = 4;
}

message ChannelEventSubscriptionResponse {
  ResponseHeader response_header = 1;
  string event_name = 2;
  string channel_name = 3;
  google.protobuf.Struct data = 4;
  string data_json = 5;
}

message GetAggregateRequest {
  RequestHeader header = 1;
  string channel_name = 2;
}

message GetAggregateResponse {
  ResponseHeader response_header = 1;
  Aggregate aggregate = 2;
}

message ListChannelsRequest {
  RequestHeader header = 1;
  // Populate each channel's `aggregate`. Off by default: the agent can list
  // channel names without reading any aggregate body.
  optional bool include_aggregate = 2;
}

message ListChannelsResponse {
  ResponseHeader response_header = 1;
  repeated ChannelDetails channels = 2;
  // False when the agent could not reach the cloud and answered from the
  // channels it tracks locally, which may be a subset of the agent's channels.
  bool from_cloud = 3;
}

message FetchAttachmentRequest {
  RequestHeader header = 1;
  Attachment attachment = 2;
}

message FetchAttachmentResponse {
  ResponseHeader response_header = 1;
  File file = 2;
}

message SendOneShotMessageRequest {
  RequestHeader header = 1;
  string channel_name = 2;
  google.protobuf.Struct data = 3;
  optional uint64 timestamp = 4;
  string data_json = 5;
}

message SendOneShotMessageResponse {
  ResponseHeader response_header = 1;
}
